<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="sejin.dev 홈">sejin<span class="dot">.</span><span class="dev">dev</span></a>
    {% if page.layout == 'post' %}
    <button class="mobile-toc-button" id="mobileTocButton" type="button" aria-label="글 목차 열기" aria-controls="mobileTocLayer" aria-expanded="false" hidden>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true"><path d="M5 5v14M5 8h5M10 8v4M10 12h5M10 16h5"></path><circle cx="5" cy="5" r="1.5"></circle><circle cx="10" cy="8" r="1.5"></circle><circle cx="15" cy="12" r="1.5"></circle><circle cx="15" cy="16" r="1.5"></circle></svg>
      <span>목차</span>
    </button>
    <div class="mobile-reader-controls" role="group" aria-label="본문 글자 크기 조절">
      <button type="button" data-reader-action="decrease" aria-label="본문 글자 축소">가−</button>
      <button type="button" data-reader-action="increase" aria-label="본문 글자 확대">가+</button>
    </div>
    {% endif %}
    <nav class="nav" aria-label="주요 메뉴">
      <a href="{{ '/notes/' | relative_url }}"{% if page.url contains '/notes/' or page.type == 'note' %} aria-current="page"{% endif %}>Notes</a>
      <a href="{{ '/news/' | relative_url }}"{% if page.url contains '/news/' or page.type == 'news' %} aria-current="page"{% endif %}>News</a>
      <a href="{{ '/papers/' | relative_url }}"{% if page.url contains '/papers/' or page.type == 'paper' %} aria-current="page"{% endif %}>Papers</a>
      <a href="{{ '/books/' | relative_url }}"{% if page.url contains '/books/' or page.type == 'book' %} aria-current="page"{% endif %}>Books</a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about/' %} aria-current="page"{% endif %}>About</a>
      <a href="https://github.com/threetrue03-crypto" target="_blank" rel="noreferrer">GitHub</a>
    </nav>
    <button class="global-search-button" id="searchButton" type="button" aria-label="전체 글 검색" aria-controls="globalSearch" aria-expanded="false" title="검색 (Ctrl/⌘ + K)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-4-4"></path></svg>
    </button>
    <button class="theme-toggle header-theme-toggle" type="button" data-theme-toggle aria-label="밤 모드로 전환" aria-pressed="false"><span class="theme-sun" aria-hidden="true">☀️</span><span class="theme-moon" aria-hidden="true">🌙</span></button>
    <button class="mobile-menu-button" type="button" aria-label="메뉴 열기" aria-controls="mobileMenu" aria-expanded="false"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"></path></svg></button>
  </div>
</header>

<div class="global-search-overlay" id="globalSearch" role="dialog" aria-modal="true" aria-label="전체 글 검색" aria-hidden="true">
  <div class="global-search-panel">
    <div class="global-search-row">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-4-4"></path></svg>
      <input class="global-search-input" id="globalSearchInput" type="search" placeholder="Notes, News, Papers, Books 검색" autocomplete="off">
      <button class="global-search-close" id="globalSearchClose" type="button" aria-label="검색 닫기">×</button>
    </div>
    <div class="global-search-results" id="globalSearchResults" aria-live="polite"><p class="global-search-empty">검색어를 입력하면 모든 기록에서 찾아드립니다.</p></div>
  </div>
</div>

<script>
  (()=>{const openButton=document.querySelector('#searchButton');const overlay=document.querySelector('#globalSearch');const input=document.querySelector('#globalSearchInput');const closeButton=document.querySelector('#globalSearchClose');const results=document.querySelector('#globalSearchResults');if(!openButton||!overlay||!input||!closeButton||!results)return;let index=null;let previousFocus=null;const typeLabel={note:'Note',news:'News',paper:'Paper',book:'Book'};const loadIndex=async()=>{if(index)return index;try{const response=await fetch('{{ '/search.json' | relative_url }}');index=await response.json()}catch{index=[]}return index};const render=async()=>{const terms=input.value.trim().toLowerCase().split(/\s+/).filter(Boolean);if(!terms.length){results.innerHTML='<p class="global-search-empty">검색어를 입력하면 모든 기록에서 찾아드립니다.</p>';return}const items=await loadIndex();const matched=items.filter(item=>terms.every(term=>item.search.includes(term))).slice(0,30);results.replaceChildren();if(!matched.length){const empty=document.createElement('p');empty.className='global-search-empty';empty.textContent='일치하는 기록이 없습니다.';results.append(empty);return}matched.forEach(item=>{const link=document.createElement('a');link.className='global-search-result';link.href=item.url;const kind=document.createElement('span');kind.className='global-search-kind';kind.textContent=typeLabel[item.type]||'Post';const copy=document.createElement('span');copy.className='global-search-copy';const title=document.createElement('strong');title.textContent=item.title;const description=document.createElement('span');description.textContent=item.description;copy.append(title,description);link.append(kind,copy);results.append(link)})};const setOpen=async open=>{overlay.classList.toggle('open',open);overlay.setAttribute('aria-hidden',String(!open));openButton.setAttribute('aria-expanded',String(open));document.body.classList.toggle('search-open',open);if(open){previousFocus=document.activeElement;await loadIndex();input.focus()}else{input.value='';results.innerHTML='<p class="global-search-empty">검색어를 입력하면 모든 기록에서 찾아드립니다.</p>';previousFocus?.focus()}};openButton.addEventListener('click',()=>setOpen(true));closeButton.addEventListener('click',()=>setOpen(false));overlay.addEventListener('click',event=>{if(event.target===overlay)setOpen(false)});input.addEventListener('input',render);document.addEventListener('keydown',event=>{if((event.ctrlKey||event.metaKey)&&event.key.toLowerCase()==='k'){event.preventDefault();setOpen(true)}if(event.key==='Escape'&&overlay.classList.contains('open'))setOpen(false);if(event.key==='Tab'&&overlay.classList.contains('open')){const focusable=[input,closeButton,...results.querySelectorAll('a')];const first=focusable[0],last=focusable.at(-1);if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus()}else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus()}}});const initialQuery=new URLSearchParams(location.search).get('q');if(initialQuery){input.value=initialQuery;setOpen(true).then(render)}})();
</script>
