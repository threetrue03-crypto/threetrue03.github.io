<script>
  (()=>{let saved=null;try{saved=localStorage.getItem('sejin-theme')}catch{}const theme=saved==='dark'||saved==='light'?saved:(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.dataset.theme=theme})();
</script>
<style>
  html{color-scheme:light;--paper:#f7f4ed;--surface:#fbfaf7;--ink:#242424;--muted:#6b6b6b;--line:#d9d4c9;--accent:#1a6b4b;--accent-soft:#e3eee7;--code:#202522}
  html[data-theme="dark"]{color-scheme:dark;--paper:#141714;--surface:#1c211d;--ink:#edf2ed;--muted:#a7b0a8;--line:#343b35;--accent:#72c69b;--accent-soft:#20392c;--code:#0d1117}
  body{color:var(--ink);background-color:var(--paper)}
  html[data-theme="dark"] .site-header{background:rgb(20 23 20 / 92%)}
  html[data-theme="dark"] .global-search-overlay{background:rgb(5 7 5 / 72%)}
  html[data-theme="dark"] .post-body code{color:#e6edf3;background:#293029}
  html[data-theme="dark"] .post-body pre code{background:transparent}
  html[data-theme="dark"] .post-body tbody tr:hover{background:rgb(114 198 155 / 9%)}
  html[data-theme="dark"] .reader-controls{background:rgb(28 33 29 / 94%);box-shadow:0 8px 28px rgb(0 0 0 / 32%)}
  html[data-theme="dark"] .mobile-menu-panel{box-shadow:-18px 0 50px rgb(0 0 0 / 34%)}
  html[data-theme="dark"] input::placeholder{color:#7f8981}
  body,.site-header,.global-search-panel,.mobile-menu-panel,.mobile-toc-panel,.reader-controls,.toc-details,.post-body th{transition:background-color .22s ease,color .22s ease,border-color .22s ease}
  .theme-toggle{display:grid;width:40px;height:40px;flex:0 0 auto;padding:0;place-items:center;border:1px solid var(--line);border-radius:50%;color:var(--ink);background:transparent;font-size:17px;line-height:1;cursor:pointer;transition:background-color .2s ease,border-color .2s ease,transform .2s ease}
  .theme-toggle:hover{background:var(--surface);transform:translateY(-1px)}
  .theme-toggle:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  .theme-moon{display:none}html[data-theme="dark"] .theme-sun{display:none}html[data-theme="dark"] .theme-moon{display:inline}
  .drawer-theme-toggle{width:100%;height:auto;margin-top:8px;padding:17px 4px;display:flex;align-items:center;justify-content:space-between;border:0;border-bottom:1px solid var(--line);border-radius:0;color:var(--muted);font-size:17px;text-align:left}
  .drawer-theme-toggle:hover{color:var(--accent);background:transparent;transform:none}
  .drawer-theme-label::after{content:'낮 모드'}html[data-theme="dark"] .drawer-theme-label::after{content:'밤 모드'}
  .site-header{position:sticky;top:0;z-index:70;border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--paper) 92%,transparent);backdrop-filter:blur(14px)}
  .header-inner{width:min(1180px,calc(100% - 40px));height:70px;margin:auto;display:flex;align-items:center;gap:24px}.brand{flex:0 0 auto;font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:-.6px}.brand .dot,.brand .dev{color:var(--accent)}
  .nav{display:flex;align-items:center;gap:24px;margin-left:auto;color:var(--muted);font-size:13px}.nav a:hover,.nav a[aria-current="page"]{color:var(--ink)}
  .global-search-button{display:grid;width:40px;height:40px;flex:0 0 auto;padding:0;place-items:center;border:1px solid var(--line);border-radius:50%;color:var(--ink);background:transparent;cursor:pointer}.global-search-button:hover{background:var(--surface)}.global-search-button:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  .mobile-toc-button{display:none;height:40px;flex:0 0 auto;padding:0 11px;align-items:center;gap:5px;border:1px solid var(--line);border-radius:999px;color:var(--ink);background:transparent;font-size:11px;font-weight:700;cursor:pointer}.mobile-toc-button:hover{background:var(--surface)}.mobile-toc-button:focus-visible{outline:2px solid var(--accent);outline-offset:3px}.mobile-toc-button[hidden]{display:none!important}
  .global-search-overlay{position:fixed;inset:0;z-index:120;display:grid;padding:8vh 20px 20px;align-items:start;justify-items:center;background:rgb(20 20 18 / 48%);opacity:0;visibility:hidden;transition:opacity .2s ease,visibility .2s ease}.global-search-overlay.open{opacity:1;visibility:visible}.global-search-panel{width:min(680px,100%);max-height:min(720px,84vh);overflow:hidden;border:1px solid var(--line);background:var(--surface);box-shadow:0 24px 70px rgb(0 0 0 / 24%)}
  .global-search-row{display:grid;grid-template-columns:auto 1fr auto;gap:12px;padding:18px 20px;align-items:center;border-bottom:1px solid var(--line);color:var(--muted)}.global-search-input{min-width:0;padding:0;border:0;outline:0;color:var(--ink);background:transparent;font:18px var(--sans)}.global-search-close{width:34px;height:34px;padding:0;border:0;color:var(--muted);background:transparent;font-size:24px;cursor:pointer}.global-search-close:hover{color:var(--ink)}
  .global-search-results{max-height:calc(min(720px,84vh) - 72px);overflow-y:auto}.global-search-empty{margin:0;padding:42px 22px;color:var(--muted);font-size:13px;text-align:center}.global-search-result{display:grid;grid-template-columns:88px 1fr;gap:18px;padding:18px 20px;border-bottom:1px solid var(--line)}.global-search-result:hover,.global-search-result:focus-visible{background:var(--accent-soft);outline:0}.global-search-kind{color:var(--accent);font:10px/1.5 var(--mono);text-transform:uppercase}.global-search-copy strong{display:block;margin-bottom:6px;font-family:var(--serif);font-size:18px;line-height:1.35}.global-search-copy span{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--muted);font-size:12px;line-height:1.55}body.search-open{overflow:hidden}
  @media(max-width:760px){.header-theme-toggle{display:none!important}}
  @media(max-width:760px){.header-inner{width:calc(100% - 32px);height:64px;gap:10px}.site-header .nav{display:none!important}.global-search-button{margin-left:auto}.global-search-panel{max-height:88vh}.global-search-overlay{padding:5vh 12px 12px}.global-search-row{padding:15px 16px}.global-search-result{grid-template-columns:1fr;gap:5px;padding:16px}.global-search-results{max-height:calc(88vh - 65px)}}
  @media(max-width:760px){.mobile-toc-button{display:flex;margin-left:auto}.mobile-toc-button~#searchButton{margin-left:0}}
  @media(prefers-reduced-motion:reduce){body,.site-header,.global-search-panel,.mobile-menu-panel,.mobile-toc-panel,.reader-controls,.toc-details,.post-body th,.theme-toggle,.global-search-overlay{transition:none!important}}
</style>
<script>
  addEventListener('DOMContentLoaded',()=>{const root=document.documentElement;const buttons=[...document.querySelectorAll('[data-theme-toggle]')];const sync=()=>{const dark=root.dataset.theme==='dark';buttons.forEach(button=>{button.setAttribute('aria-pressed',String(dark));button.setAttribute('aria-label',dark?'낮 모드로 전환':'밤 모드로 전환');button.title=dark?'낮 모드로 전환':'밤 모드로 전환'})};const setTheme=(theme,persist=true)=>{root.dataset.theme=theme;if(persist)try{localStorage.setItem('sejin-theme',theme)}catch{}sync()};buttons.forEach(button=>button.addEventListener('click',()=>setTheme(root.dataset.theme==='dark'?'light':'dark')));sync();const media=matchMedia('(prefers-color-scheme: dark)');media.addEventListener?.('change',event=>{let saved=null;try{saved=localStorage.getItem('sejin-theme')}catch{}if(!saved)setTheme(event.matches?'dark':'light',false)})});
</script>
