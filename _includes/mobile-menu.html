<style>
  .mobile-menu-button{display:none;width:40px;height:40px;padding:0;place-items:center;border:1px solid var(--line);border-radius:50%;color:var(--ink);background:transparent;cursor:pointer}
  .mobile-menu-backdrop{position:fixed;inset:0;z-index:90;background:rgb(20 20 18 / 38%);opacity:0;visibility:hidden;transition:opacity .25s ease,visibility .25s ease}
  .mobile-menu-panel{position:absolute;inset:0 0 0 auto;width:min(340px,86vw);padding:22px 24px 32px;background:var(--paper);box-shadow:-18px 0 50px rgb(20 20 18 / 14%);transform:translateX(100%);transition:transform .3s cubic-bezier(.22,.8,.25,1)}
  .mobile-menu-backdrop.open{opacity:1;visibility:visible}.mobile-menu-backdrop.open .mobile-menu-panel{transform:translateX(0)}
  .mobile-menu-head{display:flex;align-items:center;justify-content:space-between;padding-bottom:20px;border-bottom:1px solid var(--line)}
  .mobile-menu-title{font-family:var(--serif);font-size:20px;font-weight:700}.mobile-menu-title .dot,.mobile-menu-title .dev{color:var(--accent)}
  .mobile-menu-close{width:40px;height:40px;padding:0;border:1px solid var(--line);border-radius:50%;color:var(--ink);background:transparent;font-size:24px;line-height:1;cursor:pointer}
  .mobile-menu-nav{display:flex;flex-direction:column;padding-top:20px}.mobile-menu-nav a{display:flex;align-items:center;justify-content:space-between;padding:17px 4px;border-bottom:1px solid var(--line);color:var(--muted);font-size:17px}.mobile-menu-nav a::after{content:'→';font-size:14px}.mobile-menu-nav a:hover,.mobile-menu-nav a[aria-current="page"]{color:var(--accent)}
  .mobile-menu-nav .external{margin-top:14px;border-bottom:0;font-size:14px}.mobile-menu-nav .external::after{content:'↗'}
  body.menu-open{overflow:hidden}
  @media(max-width:760px){.header-inner{justify-content:flex-start!important;gap:12px!important}.header-inner>.nav,.header-inner>.github-link{display:none!important}.mobile-menu-button{display:grid;margin-left:auto}.header-inner>#searchButton{margin-left:auto}.header-inner>#searchButton~.mobile-menu-button{margin-left:0}}
</style>

<div class="mobile-menu-backdrop" id="mobileMenu" aria-hidden="true">
  <aside class="mobile-menu-panel" role="dialog" aria-modal="true" aria-label="모바일 메뉴">
    <div class="mobile-menu-head">
      <a class="mobile-menu-title" href="{{ '/' | relative_url }}">sejin<span class="dot">.</span><span class="dev">dev</span></a>
      <button class="mobile-menu-close" type="button" aria-label="메뉴 닫기">×</button>
    </div>
    <nav class="mobile-menu-nav" aria-label="모바일 주요 메뉴">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Home</a>
      <a href="{{ '/notes/' | relative_url }}"{% if page.url contains '/notes/' or page.type == 'note' %} aria-current="page"{% endif %}>Notes</a>
      <a href="{{ '/news/' | relative_url }}"{% if page.url contains '/news/' or page.type == 'news' %} aria-current="page"{% endif %}>News</a>
      <a href="{{ '/papers/' | relative_url }}"{% if page.url contains '/papers/' or page.type == 'paper' %} aria-current="page"{% endif %}>Papers</a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about/' %} aria-current="page"{% endif %}>About</a>
      <a class="external" href="https://github.com/threetrue03-crypto" target="_blank" rel="noreferrer">GitHub</a>
      <button class="theme-toggle drawer-theme-toggle" type="button" data-theme-toggle aria-label="밤 모드로 전환" aria-pressed="false"><span class="drawer-theme-label"></span><span><span class="theme-sun" aria-hidden="true">☀️</span><span class="theme-moon" aria-hidden="true">🌙</span></span></button>
    </nav>
  </aside>
</div>

<script>
  (()=>{const menu=document.querySelector('#mobileMenu');const panel=menu?.querySelector('.mobile-menu-panel');const openers=[...document.querySelectorAll('.mobile-menu-button')];const closeButton=menu?.querySelector('.mobile-menu-close');let previousFocus=null;if(!menu||!panel||!openers.length)return;const setOpen=open=>{menu.classList.toggle('open',open);menu.setAttribute('aria-hidden',String(!open));document.body.classList.toggle('menu-open',open);openers.forEach(button=>button.setAttribute('aria-expanded',String(open)));if(open){previousFocus=document.activeElement;closeButton.focus()}else if(previousFocus){previousFocus.focus()}};openers.forEach(button=>button.addEventListener('click',()=>setOpen(true)));closeButton.addEventListener('click',()=>setOpen(false));menu.addEventListener('click',event=>{if(event.target===menu)setOpen(false)});menu.querySelectorAll('a').forEach(link=>link.addEventListener('click',()=>setOpen(false)));document.addEventListener('keydown',event=>{if(event.key==='Escape'&&menu.classList.contains('open'))setOpen(false);if(event.key==='Tab'&&menu.classList.contains('open')){const focusable=[...panel.querySelectorAll('a,button')];const first=focusable[0],last=focusable.at(-1);if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus()}else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus()}}})})();
</script>
