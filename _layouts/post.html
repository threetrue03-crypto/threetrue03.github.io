<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: page.excerpt | strip_html | escape }}">
  <title>{{ page.title }} — {{ site.title }}</title>
  <style>
    :root {
      --paper:#f7f4ed; --surface:#fbfaf7; --ink:#242424; --muted:#6b6b6b;
      --line:#d9d4c9; --accent:#1a6b4b; --accent-soft:#e3eee7; --code:#202522;
      --serif:Georgia,"Noto Serif KR","Nanum Myeongjo",serif;
      --sans:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      --mono:"SFMono-Regular",Consolas,"Liberation Mono",monospace;
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;color:var(--ink);background:var(--paper);font-family:var(--sans);-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}.site-header{position:sticky;top:0;z-index:10;border-bottom:1px solid var(--line);background:rgb(247 244 237 / 92%);backdrop-filter:blur(14px)}
    .header-inner{width:min(1120px,calc(100% - 40px));height:70px;margin:auto;display:flex;align-items:center;justify-content:space-between}.brand{font-family:var(--serif);font-size:22px;font-weight:700}.dot,.dev,.back:hover{color:var(--accent)}
    .back{color:var(--muted);font-size:13px}.progress{position:fixed;inset:70px auto auto 0;width:0;height:2px;background:var(--accent);z-index:20}
    .post-header{width:min(820px,calc(100% - 40px));margin:0 auto;padding:88px 0 56px;border-bottom:1px solid var(--line)}
    .category{display:inline-block;margin-bottom:20px;padding:6px 10px;border-radius:999px;color:var(--accent);background:var(--accent-soft);font-size:12px;font-weight:700}
    h1{margin:0;font-family:var(--serif);font-size:clamp(42px,6vw,68px);font-weight:500;line-height:1.15;letter-spacing:-2.4px;word-break:keep-all}
    .description{max-width:680px;margin:24px 0 0;color:var(--muted);font-size:18px;line-height:1.7}.meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:28px;color:var(--muted);font-size:12px}
    .post-body{width:min(720px,calc(100% - 40px));margin:0 auto;padding:64px 0 100px;font-size:17px;line-height:1.9;word-break:keep-all}
    .post-body h1{font-size:38px}.post-body h2{margin:64px 0 18px;font-family:var(--serif);font-size:32px;line-height:1.4;letter-spacing:-1px}.post-body h3{margin:42px 0 14px;font-size:22px}.post-body p{margin:0 0 24px}.post-body a{color:var(--accent);text-decoration:underline;text-underline-offset:3px}
    .post-body blockquote{margin:32px 0;padding:2px 0 2px 22px;border-left:3px solid var(--accent);color:var(--muted)}.post-body blockquote p{margin:0}
    .post-body pre{margin:32px 0;padding:22px;overflow:auto;border-radius:4px;color:#eef5f0;background:var(--code);font:14px/1.7 var(--mono)}.post-body code{padding:.15em .35em;border-radius:3px;background:#e9e4da;font: .9em var(--mono)}.post-body pre code{padding:0;background:transparent}
    .post-body img{max-width:100%;height:auto}.post-body hr{margin:56px 0;border:0;border-top:1px solid var(--line)}.post-body ul,.post-body ol{padding-left:24px}.post-body li{margin:8px 0}
    .post-footer{width:min(820px,calc(100% - 40px));margin:0 auto;padding:34px 0 70px;border-top:1px solid var(--line);display:flex;justify-content:space-between;color:var(--muted);font-size:13px}
    @media(max-width:640px){.header-inner,.post-header,.post-body,.post-footer{width:calc(100% - 32px)}.post-header{padding:58px 0 40px}h1{font-size:42px;letter-spacing:-1.8px}.description{font-size:16px}.post-body{padding:44px 0 72px;font-size:16px}.post-body h2{font-size:27px}.post-body pre{margin-inline:-8px;padding:18px}}
  </style>
</head>
<body>
  <div class="progress" id="progress"></div>
  <header class="site-header"><div class="header-inner"><a class="brand" href="{{ '/' | relative_url }}">sejin<span class="dot">.</span><span class="dev">dev</span></a><a class="back" href="{{ '/notes/' | relative_url }}">← 모든 기록</a></div></header>
  <header class="post-header">
    {% if page.category %}<span class="category">{{ page.category }}</span>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="description">{{ page.description }}</p>{% endif %}
    <div class="meta"><time>{{ page.date | date: "%Y년 %m월 %d일" }}</time>{% if page.reading_time %}<span>·</span><span>{{ page.reading_time }}분 읽기</span>{% endif %}</div>
  </header>
  <article class="post-body">{{ content }}</article>
  <footer class="post-footer"><span>오늘의 이해를 기록했습니다.</span><a href="{{ '/notes/' | relative_url }}">목록으로 돌아가기 ↑</a></footer>
  <script>
    const bar=document.querySelector('#progress');
    addEventListener('scroll',()=>{const total=document.documentElement.scrollHeight-innerHeight;bar.style.width=(total>0?scrollY/total*100:0)+'%';},{passive:true});
  </script>
</body>
</html>
