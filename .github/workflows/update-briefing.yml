name: Update tech briefing

on:
  workflow_dispatch:
  schedule:
    # 07:00 KST (22:00 UTC on the previous day)
    - cron: "0 22 * * *"

permissions:
  contents: write

concurrency:
  group: update-tech-briefing
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependency
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.2

      - name: Fetch recent news and papers
        run: python scripts/update_briefing.py

      - name: Commit refreshed briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/briefing.yml
          if git diff --cached --quiet; then
            echo "No briefing changes to commit."
          else
            git commit -m "chore: refresh tech briefing"
            git push
          fi
