name: Update tech news

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/update_tech_news.py"
      - ".github/workflows/update-tech-news.yml"

permissions:
  contents: write

concurrency:
  group: update-tech-news
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Collect relevant technology news
        run: python scripts/update_tech_news.py
      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/tech_news.json
          if git diff --cached --quiet; then
            echo "No news changes"
          else
            git commit -m "chore: update technology news"
            git push
          fi
